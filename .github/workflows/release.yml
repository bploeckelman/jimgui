name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest   # buildNatives requires MSVC
    permissions:
      contents: write    # create GitHub Release
      packages: write    # publish to GitHub Packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Extract version
        id: version
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Build and publish
        run: ./gradlew buildNatives build publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      # Upload per-module JARs, sources JARs, and POMs as flat release assets.
      # jitpack.yml downloads these by constructing the URL from $VERSION.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/maven-repo/net/bplo/libs/jimgui-native/${{ steps.version.outputs.version }}/jimgui-native-${{ steps.version.outputs.version }}.jar
            build/maven-repo/net/bplo/libs/jimgui-native/${{ steps.version.outputs.version }}/jimgui-native-${{ steps.version.outputs.version }}-sources.jar
            build/maven-repo/net/bplo/libs/jimgui-native/${{ steps.version.outputs.version }}/jimgui-native-${{ steps.version.outputs.version }}.pom
            build/maven-repo/net/bplo/libs/jimgui-binding/${{ steps.version.outputs.version }}/jimgui-binding-${{ steps.version.outputs.version }}.jar
            build/maven-repo/net/bplo/libs/jimgui-binding/${{ steps.version.outputs.version }}/jimgui-binding-${{ steps.version.outputs.version }}-sources.jar
            build/maven-repo/net/bplo/libs/jimgui-binding/${{ steps.version.outputs.version }}/jimgui-binding-${{ steps.version.outputs.version }}.pom
            build/maven-repo/net/bplo/libs/jimgui-core/${{ steps.version.outputs.version }}/jimgui-core-${{ steps.version.outputs.version }}.jar
            build/maven-repo/net/bplo/libs/jimgui-core/${{ steps.version.outputs.version }}/jimgui-core-${{ steps.version.outputs.version }}-sources.jar
            build/maven-repo/net/bplo/libs/jimgui-core/${{ steps.version.outputs.version }}/jimgui-core-${{ steps.version.outputs.version }}.pom

      # Pass the local maven-repo to the deploy job (rsync not available on Windows).
      - uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: build/maven-repo/

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: build/maven-repo/

      - name: Add .nojekyll
        run: touch build/maven-repo/.nojekyll

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/maven-repo
          target-folder: .
          clean: false
