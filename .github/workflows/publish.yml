name: Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # buildNatives requires MSVC
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - run: ./gradlew buildNatives build publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      # Pass the local maven-repo to the deploy job (rsync not available on Windows).
      - uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: build/maven-repo/

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: build/maven-repo/

      - name: Add .nojekyll
        run: touch build/maven-repo/.nojekyll

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/maven-repo
          target-folder: .
          clean: false
